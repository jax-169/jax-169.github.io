theme: jekyll-theme-chirpy
lang: zh-CN
timezone: Asia/Shanghai
title: "Jax的技术博客"
tagline: "探索与创造的数字空间"
url: "https://jax-169.github.io"
baseurl: ""

github:
  username: jax-169

# ==================================================
# 个人信息（已更新）
# ==================================================
social:
  name: "Jax"
  email: "q_398@foxmail.com"
  links:
    - "https://github.com/jax-169"

# ==================================================
# 主题功能配置
# ==================================================
avatar: "/1749958354868.webp"
toc: true
theme_mode: 
paginate: 5

comments:
  provider: # 已禁用

description: >
  Jax的个人技术博客与创作空间

# ==================================================
# 保留默认配置（无需修改）
# ==================================================
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
