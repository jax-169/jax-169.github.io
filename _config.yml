# ==================================================
# 核心配置
# ==================================================
theme: jekyll-theme-chirpy
lang: zh-CN
timezone: Asia/Shanghai
title: "Jax的博客空间"  # 更友好的标题
tagline: "探索技术前沿与生活思考"  # 明确的副标题
url: "https://jax-169.github.io"
baseurl: ""

github:
  username: jax-169

# ==================================================
# 用户信息与社交配置
# ==================================================
social:
  name: Jax
  email: q_398@foxmail.com
  links:
    - title: GitHub
      icon: "fab fa-github"
      url: "https://github.com/jax-169"

# ==================================================
# 主题外观
# ==================================================
avatar: /1749958354868.webp  # 已修复路径
toc: true
theme_mode:
paginate: 5

# ==================================================
# 评论系统配置（临时禁用）
# ==================================================
# comments:
#   provider: giscus
#   giscus:
#     repo: jax-169/jax-169.github.io
#     repo_id: "R_XXXXXXXXXX"
#     category: "Comments"
#     category_id: "DIC_XXXXXXXXXX"

# ==================================================
# 优化配置
# ==================================================
description: "Jax的个人技术博客"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      # 已移除可能冲突的permalink配置

collections:
  tabs:
    output: true
    sort_by: order

# ==================================================
# 高级功能
# ==================================================
# analytics:
#   provider: google
#   google:
#     id: UA-XXXXXXXXX-X

pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths: []

# ==================================================
# 保持不变的部分
# ==================================================
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
